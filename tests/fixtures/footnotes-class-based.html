<h2 id="ch8">Chapter 8: The Teaching</h2>
<p>The Buddha gave a discourse on the nature of suffering.<sup><a href="#fn8_11" id="fn8_1">1</a></sup></p>
<p>He further elaborated on the path to liberation.<sup><a href="#fn8_22" id="fn8_2">2</a></sup></p>
<hr/>
